

name: BUILD AND TEST
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        ports:
          - 5432:5432
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: github_actions_db
          POSTGRES_HOST: localhost
          SECRET: RMi7R08iX02B8s85QXmXvCK7
          REFRESH_SECRET: 2B8s85QXmXvCK7RMi7R08iX0
          EMAIL_PASSWORD: 5ioVUFj4KdOF1aR15iLS9HvZ
          CLOUDINARY_CLOUD_NAME: Xl9q9TVz88jF8gxrb9XudOX2
          CLOUDINARY_API_KEY: Jfu39X7wCmS05aBd2oJb9j3c
          CLOUDINARY_API_SECRET: 7W8b0ksC84cQq9n97tXqu8gW
        options: >-
          --health-cmd pg_isready 
          --health-interval 10s 
          --health-timeout 5s 
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        id: dependency
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir psycopg2-binary
          pip install --no-cache-dir -r requirements.txt
          pip install flake8 flake8-bugbear flake8-black

      - name: Flake8 Lint
        run: |
          flake8 --ignore F401 --exclude __init__.py,__pycache__ --max-line-length 100 . || true
        id: flake8

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flake8-lint-results
          path: |
            ./
            *.py
        if: always()
      
      - name: Copy .env.sample to .env
        run: cp .env.sample .env

      - name: Run migration
        run: alembic upgrade head
      
      - name: Test with pytest
        run: pytest
